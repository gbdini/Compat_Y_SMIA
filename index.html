<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analyseur de Compatibilités Médicamenteuses en Y</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #0f172a;
      --border: #e2e8f0;
      
      /* Statuts UI */
      --status-c-bg: #dcfce7;
      --status-c-text: #15803d;
      --status-i-bg: #fee2e2;
      --status-i-text: #b91c1c;
      --status-nd-bg: #fef3c7;
      --status-nd-text: #b45309;
      --status-mix-bg: #ffedd5;
      --status-mix-text: #c2410c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 100%;
      margin: 0 auto;
      padding: 0 1rem;
    }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
      border: 1px solid var(--border);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    /* La carte de la matrice prend toute la largeur disponible */
    .card-full {
      max-width: 100% !important;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #1e293b;
    }

    h3 {
      font-size: 1.1rem;
      color: #334155;
      margin-bottom: 0.75rem;
    }

    p.subtitle {
      color: #64748b;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    /* Champ de recherche & Autocomplétion */
    .search-container {
      position: relative;
      margin-bottom: 1rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
    }

    .suggestions-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 1000;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      display: none;
    }

    .suggestion-item {
      padding: 0.75rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid #f1f5f9;
    }

    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover { background-color: #f1f5f9; }

    /* Badges / Sélection */
    .selected-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      min-height: 38px;
    }

    .tag {
      background: #eff6ff;
      color: #1e40af;
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid #bfdbfe;
    }

    .tag button {
      background: none;
      border: none;
      color: #1e40af;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.1rem;
      line-height: 1;
    }

    /* Boutons */
    .btn-container {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .btn-primary {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.8rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:disabled { background: #cbd5e1; cursor: not-allowed; }

    .btn-secondary {
      width: 100%;
      background: #64748b;
      color: white;
      border: none;
      padding: 0.8rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-secondary:hover { background: #475569; }

    /* Zone de Résultat Analyse */
    .result-banner {
      padding: 1rem 1.25rem;
      border-radius: 8px;
      font-size: 1.2rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1.5rem;
      display: none;
    }

    .banner-C { background: var(--status-c-bg); color: var(--status-c-text); border: 1px solid #bbf7d0; }
    .banner-I { background: var(--status-i-bg); color: var(--status-i-text); border: 1px solid #fca5a5; }
    .banner-ND { background: var(--status-nd-bg); color: var(--status-nd-text); border: 1px solid #fde68a; }
    .banner-I_ND { background: var(--status-mix-bg); color: var(--status-mix-text); border: 1px solid #ffedd5; }

    /* Tableau des paires (Résultat Analyse) */
    .pairs-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }

    .pairs-table th, .pairs-table td {
      padding: 0.75rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .pairs-table th {
      background-color: #f8fafc;
      color: #475569;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-pill {
      display: inline-block;
      padding: 0.25rem 0.6rem;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .pill-C { background: var(--status-c-bg); color: var(--status-c-text); }
    .pill-I { background: var(--status-i-bg); color: var(--status-i-text); }
    .pill-ND { background: var(--status-nd-bg); color: var(--status-nd-text); }

    /* ==========================================
       NOUVEAUX STYLES DE LA MATRICE PLEINE LARGEUR
       ========================================== */
    .matrix-container {
      width: 100%;
      overflow-x: auto; /* Défilement horizontal léger si l'écran est petit */
      margin-top: 1rem;
    }

    .matrix-table {
      border-collapse: separate;
      border-spacing: 1px;
      font-size: 0.65rem;
      background-color: #cbd5e1;
      margin: 0 auto;
    }

    .matrix-table th, .matrix-table td {
      width: 20px;
      height: 20px;
      min-width: 20px;
      text-align: center;
      vertical-align: middle;
      padding: 0;
    }

    /* Alignement vertical des en-têtes de colonnes */
    .matrix-table th.col-header {
      background-color: #f1f5f9;
      font-weight: 600;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      padding: 8px 2px;
      height: 120px;
      white-space: nowrap;
      font-size: 0.7rem;
      color: #334155;
    }

    .matrix-table td.row-header {
      background-color: #f1f5f9;
      font-weight: 600;
      text-align: right;
      padding: 0 6px;
      white-space: nowrap;
      width: auto;
      font-size: 0.7rem;
      color: #334155;
    }

    /* Couleurs des cellules */
    .cell-same { background-color: #94a3b8; color: transparent; }
    .cell-C    { background-color: #22c55e; color: white; font-weight: bold; }
    .cell-I    { background-color: #ef4444; color: white; font-weight: bold; }
    .cell-ND   { background-color: #ffffff; color: transparent; }

    /* Effet survol professionnel pour se repérer dans la grille */
    .matrix-table tr:hover td {
      filter: brightness(0.9);
    }
    
    .matrix-table td:hover {
      outline: 2px solid #000;
      z-index: 10;
      position: relative;
    }

    .matrix-legend {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-top: 0.75rem;
      font-size: 0.85rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .legend-box {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      border: 1px solid #cbd5e1;
    }
  </style>
</head>

<div class="container">
  <!-- Carte 1 : Recherche et Actions -->
  <div class="card">
    <h1>Compatibilité Médicamenteuse en Y</h1>
    <p class="subtitle">Sélectionnez 2 substances ou plus pour évaluer le mélange, ou génerer la matrice globale.</p>

    </div>
  </div>

  <!-- Carte 2 : Résultat de l'analyse ciblée -->
  <div id="resultCard" class="card" style="display: none;">

    <h3>Détail des combinaisons</h3>
    <table class="pairs-table">
      <thead>
        <tr>
          <th>Couple de substances</th>
          <th>Statut de compatibilité</th>
        </tr>
      </thead>
      <tbody id="pairsTableBody"></tbody>
    </table>
  </div>

  <!-- Carte 3 : Matrice globale (Pleine largeur) -->
  <div id="matrixCard" class="card card-full" style="display: none;">
    <h3>Matrice globale des compatibilités</h3>
    
    <div class="matrix-legend">
      <div class="legend-item"><div class="legend-box cell-C"></div> Compatible (C)</div>
      <div class="legend-item"><div class="legend-box cell-I"></div> Incompatible (I)</div>
      <div class="legend-item"><div class="legend-box cell-same"></div> Même substance</div>
      <div class="legend-item"><div class="legend-box cell-ND"></div> Non renseigné</div>
    </div>

    <div class="matrix-container">
      <table class="matrix-table">
        <thead id="matrixHead"></thead>
        <tbody id="matrixBody"></tbody>
      </table>
    </div>
  </div>
</div>

  // ==========================================
  // 2. PRÉPARATION DU MOTEUR & DONNÉES
  // ==========================================
  const normalize = (str) => str.trim().toLowerCase();

  const compatibilityMap = new Map();
  const allSubstancesSet = new Set();

  rawData.forEach(row => {
    const subA = normalize(row.Substance_A);
    const subB = normalize(row.Substance_B);
    
    allSubstancesSet.add(subA);
    allSubstancesSet.add(subB);

    const canonicalKey = [subA, subB].sort().join('_');
    compatibilityMap.set(canonicalKey, row.Compatibilité);
  });

  const availableSubstances = Array.from(allSubstancesSet).sort();
  const selectedSubstances = new Set();

  // ==========================================
  // 3. GESTION DE LA RECHERCHE & SÉLECTION
  // ==========================================
  const searchInput = document.getElementById('searchInput');
  const suggestionsBox = document.getElementById('suggestions');
  const selectedContainer = document.getElementById('selectedContainer');
  const analyzeBtn = document.getElementById('analyzeBtn');

  searchInput.addEventListener('input', (e) => {
    const query = normalize(e.target.value);
    suggestionsBox.innerHTML = '';

    if (!query) {
      suggestionsBox.style.display = 'none';
      return;
    }

    const matches = availableSubstances.filter(sub => 
      sub.includes(query) && !selectedSubstances.has(sub)
    );

    if (matches.length > 0) {
      matches.forEach(match => {
        const div = document.createElement('div');
        div.className = 'suggestion-item';
        div.textContent = capitalize(match);
        div.addEventListener('click', () => addSubstance(match));
        suggestionsBox.appendChild(div);
      });
      suggestionsBox.style.display = 'block';
    } else {
      suggestionsBox.style.display = 'none';
    }
  });

  document.addEventListener('click', (e) => {
    if (!searchInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
      suggestionsBox.style.display = 'none';
    }
  });

  function addSubstance(substance) {
    selectedSubstances.add(substance);
    searchInput.value = '';
    suggestionsBox.style.display = 'none';
    renderTags();
    resetResults();
  }

  function removeSubstance(substance) {
    selectedSubstances.delete(substance);
    renderTags();
    resetResults();
  }

  function renderTags() {
    selectedContainer.innerHTML = '';
    selectedSubstances.forEach(sub => {
      const tag = document.createElement('div');
      tag.className = 'tag';
      tag.innerHTML = `
        ${capitalize(sub)}
        <button onclick="removeSubstance('${sub}')">&times;</button>
      `;
      selectedContainer.appendChild(tag);
    });

    analyzeBtn.disabled = selectedSubstances.size < 2;
  }

  function resetResults() {
    document.getElementById('resultCard').style.display = 'none';
  }

  function capitalize(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
  }

  // ==========================================
  // 4. MOTEUR D'ÉVALUATION DES MÉLANGES
  // ==========================================
  analyzeBtn.addEventListener('click', runAnalysis);

  function runAnalysis() {
    const list = Array.from(selectedSubstances);
    const pairsResult = [];
    
    let countIncompatible = 0;
    let countMissing = 0;

    for (let i = 0; i < list.length; i++) {
      for (let j = i + 1; j < list.length; j++) {
        const subA = list[i];
        const subB = list[j];
        const canonicalKey = [subA, subB].sort().join('_');
        
        let status = compatibilityMap.get(canonicalKey);

        if (!status) {
          status = 'ND';
          countMissing++;
        } else if (status === 'I') {
          countIncompatible++;
        }

        pairsResult.push({ subA, subB, status });
      }
    }

    let globalMessage = "";
    let bannerClass = "";

    if (countIncompatible > 0 && countMissing > 0) {
      globalMessage = "Incompatible, et données manquantes";
      bannerClass = "banner-I_ND";
    } else if (countIncompatible > 0) {
      globalMessage = "Incompatible";
      bannerClass = "banner-I";
    } else if (countMissing > 0) {
      globalMessage = "Données manquantes";
      bannerClass = "banner-ND";
    } else {
      globalMessage = "Compatible";
      bannerClass = "banner-C";
    }

    displayResults(globalMessage, bannerClass, pairsResult);
  }

  function displayResults(message, bannerClass, pairs) {
    const resultCard = document.getElementById('resultCard');
    const resultBanner = document.getElementById('resultBanner');
    const tableBody = document.getElementById('pairsTableBody');

    resultBanner.textContent = message;
    resultBanner.className = `result-banner ${bannerClass}`;

    tableBody.innerHTML = '';
    pairs.forEach(pair => {
      const row = document.createElement('tr');
      
      let statusBadge = "";
      if (pair.status === 'C') statusBadge = `<span class="status-pill pill-C">Compatible</span>`;
      else if (pair.status === 'I') statusBadge = `<span class="status-pill pill-I">Incompatible</span>`;
      else statusBadge = `<span class="status-pill pill-ND">Donnée manquante</span>`;

      row.innerHTML = `
        <td><strong>${capitalize(pair.subA)}</strong> & <strong>${capitalize(pair.subB)}</strong></td>
        <td>${statusBadge}</td>
      `;
      tableBody.appendChild(row);
    });

    resultCard.style.display = 'block';
  }

  // ==========================================
  // 5. MOTEUR DE GÉNÉRATION DE LA MATRICE COMPACTE
  // ==========================================
  const toggleMatrixBtn = document.getElementById('toggleMatrixBtn');
  const matrixCard = document.getElementById('matrixCard');

  toggleMatrixBtn.addEventListener('click', () => {
    if (matrixCard.style.display === 'none') {
      generateMatrix();
      matrixCard.style.display = 'block';
      toggleMatrixBtn.textContent = "Masquer la matrice globale";
    } else {
      matrixCard.style.display = 'none';
      toggleMatrixBtn.textContent = "Tableau complet";
    }
  });

  function generateMatrix() {
    const head = document.getElementById('matrixHead');
    const body = document.getElementById('matrixBody');

    head.innerHTML = '';
    body.innerHTML = '';

    // En-têtes de colonnes (Orientation verticale)
    const headerRow = document.createElement('tr');
    headerRow.innerHTML = '<th style="background:transparent;"></th>';
    
    availableSubstances.forEach(sub => {
      const th = document.createElement('th');
      th.className = 'col-header';
      th.textContent = capitalize(sub);
      headerRow.appendChild(th);
    });
    head.appendChild(headerRow);

    // Lignes de la matrice
    availableSubstances.forEach(subRow => {
      const tr = document.createElement('tr');
      
      const tdHeader = document.createElement('td');
      tdHeader.className = 'row-header';
      tdHeader.textContent = capitalize(subRow);
      tr.appendChild(tdHeader);

      availableSubstances.forEach(subCol => {
        const td = document.createElement('td');

        if (subRow === subCol) {
          td.className = 'cell-same';
          td.title = `${capitalize(subRow)} (Même substance)`;
        } else {
          const key = [subRow, subCol].sort().join('_');
          const status = compatibilityMap.get(key);

          if (status === 'C') {
            td.className = 'cell-C';
            td.textContent = 'C';
            td.title = `${capitalize(subRow)} + ${capitalize(subCol)} : Compatible`;
          } else if (status === 'I') {
            td.className = 'cell-I';
            td.textContent = 'I';
            td.title = `${capitalize(subRow)} + ${capitalize(subCol)} : Incompatible`;
          } else {
            td.className = 'cell-ND';
            td.title = `${capitalize(subRow)} + ${capitalize(subCol)} : Donnée manquante`;
          }
        }

        tr.appendChild(td);
      });

      body.appendChild(tr);
    });
  }
</script>

</body>
